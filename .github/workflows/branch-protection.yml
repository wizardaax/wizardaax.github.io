name: Branch Protection

# aeon-standards@v1 – auto-enforce canonical branch protection on main.
# Triggers whenever this file itself changes on main (or on manual dispatch).
#
# Prerequisites
# -------------
# Create a repository secret named BRANCH_PROTECTION_TOKEN containing a
# fine-grained PAT (or classic PAT with `repo` scope) for this repository.
# GITHUB_TOKEN cannot modify branch protection rules – a PAT is required.

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/branch-protection.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply-protection:
    name: Apply branch protection
    runs-on: ubuntu-latest
    steps:
      - name: Check secret availability
        id: check
        run: |
          if [ -z "${{ secrets.BRANCH_PROTECTION_TOKEN }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::BRANCH_PROTECTION_TOKEN secret is not set – skipping branch protection enforcement."
            echo "::warning::Add a PAT with 'repo' scope as the BRANCH_PROTECTION_TOKEN repository secret."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply branch protection rules to main
        if: steps.check.outputs.available == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              branch: 'main',
              required_status_checks: {
                strict: false,
                contexts: [
                  'Security / Security Scan (shared)',
                  'Pages Sanity / validate',
                ],
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
            });
            core.info('Branch protection rules applied to main ✓');
